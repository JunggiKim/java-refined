name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21 for Gradle
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up JDK 8 for Gradle toolchains
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "8"

      - name: Configure Gradle JVMs
        run: |
          echo "JAVA_HOME=${JAVA_HOME_21_X64}" >> "$GITHUB_ENV"
          echo "ORG_GRADLE_JAVA_INSTALLATIONS_PATHS=${JAVA_HOME_21_X64},${JAVA_HOME_8_X64}" >> "$GITHUB_ENV"
          echo "${JAVA_HOME_21_X64}/bin" >> "$GITHUB_PATH"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Verify build, quality gates, Java 8 compatibility, and coverage
        run: ./gradlew clean check testJava8 jacocoTestReport

      - name: Run mutation testing
        run: ./gradlew pitest

      - name: Generate documentation
        run: ./gradlew javadoc

      - name: Upload test and coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-and-coverage-reports
          path: |
            build/reports/tests/test
            build/reports/tests/testJava8
            build/reports/jacoco/test
            build/reports/pitest
