name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21 for Gradle
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up JDK 8 for Gradle toolchains
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "8"

      - name: Configure Gradle JVMs
        run: |
          echo "JAVA_HOME=${JAVA_HOME_21_X64}" >> "$GITHUB_ENV"
          echo "ORG_GRADLE_JAVA_INSTALLATIONS_PATHS=${JAVA_HOME_21_X64},${JAVA_HOME_8_X64}" >> "$GITHUB_ENV"
          echo "${JAVA_HOME_21_X64}/bin" >> "$GITHUB_PATH"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Verify build, quality gates, and Java 8 compatibility
        run: ./gradlew clean check testJava8

      - name: Publish to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
