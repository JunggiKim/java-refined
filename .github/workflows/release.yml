name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21 for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up JDK 8 for Gradle toolchains
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      - name: Configure Gradle JVMs
        run: |
          echo "JAVA_HOME=${JAVA_HOME_21_X64}" >> "$GITHUB_ENV"
          echo "ORG_GRADLE_JAVA_INSTALLATIONS_PATHS=${JAVA_HOME_21_X64},${JAVA_HOME_8_X64}" >> "$GITHUB_ENV"
          echo "${JAVA_HOME_21_X64}/bin" >> "$GITHUB_PATH"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify release build and Java 8 compatibility
        run: ./gradlew clean prepareRelease

      - name: Publish staged artifacts and create release metadata
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.JRELEASER_GITHUB_TOKEN }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.JRELEASER_MAVENCENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.JRELEASER_MAVENCENTRAL_PASSWORD }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
        run: ./gradlew jreleaserFullRelease
